<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Async Weather Tracker</h1>

    <div class="mainBox">

        <div class="container1">

            <div class="searchBox">
                <h3>Search City</h3>
                <form>
                    <div class="input-row">
                        <input type="text" id="cityInput" placeholder="Delhi, Mumbai...">
                        <button type="submit" id="btn">Search</button>
                    </div>
                </form>

                <h3 style="margin-top: 20px;">Search History</h3>
                <div class="searchedCities"></div>
            </div>

            <div class="weatherBox">
                <h3>Weather Info</h3>
                <div id="fetchData"></div>
            </div>

        </div>

        <div class="consoleBox">
            <h3>Console - Event Loop</h3>
            <div id="consoleOutput"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
